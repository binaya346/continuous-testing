# ──────────────────────────────────────────────────────────────
# sonar-project.properties
# Place this file at the root of your project repository.
# The sonar-scanner CLI picks it up automatically.
# ──────────────────────────────────────────────────────────────

# Unique key for this project in SonarQube (no spaces, no special chars)
sonar.projectKey=my-app

# Display name shown in the SonarQube UI
sonar.projectName=My App

# Version shown in SonarQube — can be set dynamically via -Dsonar.projectVersion=$BUILD_NUMBER in Jenkins
sonar.projectVersion=1.0

# ── Source directories ──────────────────────────────────────────
# Java/Maven layout
sonar.sources=src/main/java
sonar.tests=src/test/java

# For a flat project (all sources at root)
# sonar.sources=.

# ── Java-specific: compiled bytecode (required for accurate Java analysis) ──
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# ── Exclusions ──────────────────────────────────────────────────
sonar.exclusions=**/node_modules/**,**/vendor/**,**/target/**,**/*.min.js

# ── Encoding ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
